<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Paizō - Location</title>
  <meta name="description" content="Find the current location of the user with Paizo">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    #map {
      height: 350px;
      width: 100%;
      border-radius: 12px;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-warning fixed-top shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Paizō</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link active" href="location.html">Location</a></li>
          <li class="nav-item"><a class="nav-link" href="extra.html">Extra</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container pt-5 mt-5">
    <header class="text-center mb-4">
      <h1>Your Current Location</h1>
      <h3>Paizō can detect your current coordinates</h3>
    </header>

    <section class="text-center">
      <p id="location-status">Finding your location...</p>
      <p><strong>Latitude:</strong> <span id="latitude">Waiting...</span></p>
      <p><strong>Longitude:</strong> <span id="longitude">Waiting...</span></p>
    </section>

    <section>
      <div id="map"></div>
    </section>
  </main>

  <script>
    function showPosition(position) {
      const latitude = position.coords.latitude;
      const longitude = position.coords.longitude;

      document.getElementById("latitude").textContent = latitude;
      document.getElementById("longitude").textContent = longitude;
      document.getElementById("location-status").textContent = "Location found successfully.";

      const map = L.map('map').setView([latitude, longitude], 15);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      L.marker([latitude, longitude]).addTo(map)
        .bindPopup("You are here!")
        .openPopup();
    }

    function showError(error) {
      const status = document.getElementById("location-status");

      switch(error.code) {
        case error.PERMISSION_DENIED:
          status.textContent = "Location access was denied by the user.";
          break;
        case error.POSITION_UNAVAILABLE:
          status.textContent = "Location information is unavailable.";
          break;
        case error.TIMEOUT:
          status.textContent = "The request to get your location timed out.";
          break;
        default:
          status.textContent = "An unknown error occurred while retrieving location.";
          break;
      }

      document.getElementById("latitude").textContent = "Unavailable";
      document.getElementById("longitude").textContent = "Unavailable";
    }

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(showPosition, showError);
    } else {
      document.getElementById("location-status").textContent = "Geolocation is not supported by this browser.";
      document.getElementById("latitude").textContent = "Unavailable";
      document.getElementById("longitude").textContent = "Unavailable";
    }
  </script>
</body>
</html>
