<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Paizō - Contact Us</title>
  <meta name="description" content="Contact Paizo luxury educational toys">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-warning fixed-top shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Paizō</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="location.html">Location</a></li>
          <li class="nav-item"><a class="nav-link" href="extra.html">Extra</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container pt-5 mt-5">
    <header class="text-center mb-4">
      <h1>Contact Paizō</h1>
      <h3>We would love to hear from you</h3>
    </header>

    <section class="mb-4">
      <h2 class="h4">Company Information</h2>
      <p><strong>Email:</strong> hello@paizotoys.com</p>
      <p><strong>Phone:</strong> (650) 555-1434</p>
      <p><strong>Address:</strong> 100 Barkues, San Mateo, CA 94401</p>
      <p><strong>Facebook:</strong> <a href="https://www.facebook.com/" target="_blank" rel="noopener noreferrer">Visit our Facebook page</a></p>
    </section>

    <section>
      <h2 class="h4 mb-3">Send Us a Message</h2>

      <form action="#" method="post">
        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input type="text" class="form-control" id="name" name="name" required>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" name="email" required>
        </div>

        <div class="mb-3">
          <label for="comment" class="form-label">Comment</label>
          <textarea class="form-control" id="comment" name="comment" rows="4" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
    </section>
  </main>
</body>
</html>
